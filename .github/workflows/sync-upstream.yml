name: Sync Upstream

# Runs weekly and can be triggered manually.
# Opens a PR when new upstream commits are found, so you can review
# conflicts before merging — rather than force-pushing to main.
on:
  schedule:
    - cron: '0 9 * * 1'  # every Monday at 09:00 UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/mustakshif/Asri.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Check for new commits
        id: check
        run: |
          BEHIND=$(git rev-list HEAD..upstream/master --count 2>/dev/null || git rev-list HEAD..upstream/main --count 2>/dev/null || echo 0)
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT
          echo "Upstream is $BEHIND commits ahead"

      - name: Create sync branch
        if: steps.check.outputs.behind != '0'
        run: |
          BRANCH="sync/upstream-$(date +'%Y%m%d')"
          git checkout -b "$BRANCH"
          UPSTREAM_BRANCH=$(git ls-remote --heads upstream master | grep -q master && echo master || echo main)
          git merge "upstream/$UPSTREAM_BRANCH" --no-edit || true
          git push origin "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Open Pull Request
        if: steps.check.outputs.behind != '0'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ env.BRANCH }}
          title: "chore: sync upstream mustakshif/Asri"
          body: |
            Automated weekly sync from [mustakshif/Asri](https://github.com/mustakshif/Asri).

            **Review carefully** — resolve any conflicts with fork-specific changes
            (`theme.json`, `README.md`, `.github/workflows/main.yml`) before merging.
          labels: upstream-sync
          draft: false
